name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "25"
          cache: sbt

      - name: Set up sbt
        uses: sbt/setup-sbt@v1

      - name: Check formatting
        run: sbt scalafmtCheckAll

      - name: Run tests
        run: sbt test
